<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSV Atelier Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#fafafa; font-family:sans-serif; }
.card:hover { transform:scale(1.04); transition:0.3s; }
</style>
</head>

<body>

<!-- NAV -->
<div class="flex justify-between p-4 bg-white shadow">
<h1 class="font-bold text-xl">SSV Atelier</h1>
<div>
<button onclick="show('home')" class="mr-2">Home</button>
<button onclick="show('admin')" class="mr-2">Admin</button>
<button onclick="show('order')">Order</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="p-4">
<h2 class="text-2xl mb-3">Design Gallery</h2>

<input id="search" onkeyup="search()" placeholder="Search..." class="border p-2 w-full mb-3">

<div id="grid" class="grid md:grid-cols-3 gap-4"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="hidden p-4 max-w-md mx-auto">
<h2 class="text-xl mb-3">Add New Design</h2>

<input id="dname" placeholder="Design Name" class="border p-2 w-full mb-2">
<input id="dprice" placeholder="Price" class="border p-2 w-full mb-2">
<input id="dimg" placeholder="Image URL" class="border p-2 w-full mb-2">
<select id="dcat" class="border p-2 w-full mb-2">
<option value="bridal">Bridal</option>
<option value="simple">Simple</option>
<option value="maggam">Maggam</option>
</select>

<button onclick="addDesign()" class="bg-black text-white p-2 w-full">Add Design</button>
</div>

<!-- ORDER -->
<div id="order" class="hidden p-4 max-w-md mx-auto">
<h2 class="text-xl mb-3">Place Order</h2>

<input id="name" placeholder="Name" class="border p-2 w-full mb-2">
<input id="phone" placeholder="Phone" class="border p-2 w-full mb-2">
<textarea id="addr" placeholder="Address" class="border p-2 w-full mb-2"></textarea>
<input id="model" readonly class="border p-2 w-full mb-2">

<button onclick="send()" class="bg-black text-white p-2 w-full">WhatsApp</button>
</div>

<script>

// STORAGE
let designs = JSON.parse(localStorage.getItem("designs")) || [
{ name:"Bridal Peacock", price:"₹5000", img:"https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=800" },
{ name:"Simple Neck", price:"₹900", img:"https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=800" }
];

// LOAD
function load(){
let grid=document.getElementById("grid");
grid.innerHTML="";

designs.forEach(d=>{
grid.innerHTML+=`
<div class="card bg-white p-3 border">
<img src="${d.img}" class="h-48 w-full object-cover mb-2">
<h3>${d.name}</h3>
<p>${d.price}</p>
<button onclick="select('${d.name}','${d.price}')" class="border w-full mt-2">Select</button>
</div>`;
});
}

// ADD DESIGN
function addDesign(){
let d={
name:dname.value,
price:dprice.value,
img:dimg.value
};

designs.push(d);
localStorage.setItem("designs",JSON.stringify(designs));

alert("Added!");
load();
}

// SEARCH
function search(){
let val=search.value.toLowerCase();
let filtered=designs.filter(d=>d.name.toLowerCase().includes(val));

let grid=document.getElementById("grid");
grid.innerHTML="";

filtered.forEach(d=>{
grid.innerHTML+=`
<div class="card bg-white p-3 border">
<img src="${d.img}" class="h-48 w-full object-cover mb-2">
<h3>${d.name}</h3>
<p>${d.price}</p>
<button onclick="select('${d.name}','${d.price}')" class="border w-full mt-2">Select</button>
</div>`;
});
}

// SELECT
function select(n,p){
model.value = n+" - "+p;
show("order");
}

// NAV
function show(id){
["home","admin","order"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
}

// SEND
function send(){
let msg=`Order:%0AName:${name.value}%0APhone:${phone.value}%0AAddress:${addr.value}%0AModel:${model.value}`;
window.open("https://wa.me/919966937346?text="+msg);
}

load();

</script>

</body>
</html>
